listen: ":8080"

http:
  read_header_timeout: 5s
  read_timeout: 10m
  write_timeout: 10m
  idle_timeout: 2m

peer:
  mode: peer
  forward_timeout: 10m
  # Gateway does not need local_id. It must receive the same static peer list as
  # the cache pods so owner routing uses the exact same rendezvous hash ring.
  peers:
    - id: simple-s3-cache-0
      url: http://simple-s3-cache-0.simple-s3-cache-peers:8080
    - id: simple-s3-cache-1
      url: http://simple-s3-cache-1.simple-s3-cache-peers:8080
