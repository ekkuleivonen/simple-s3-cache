{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "simple-s3-cache.fullname" . }}
  labels:
    {{- include "simple-s3-cache.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: simple-s3-cache.rules
      rules:
        {{- toYaml .Values.prometheusRule.rules | nindent 8 }}
{{- end }}
