{{- if .Values.networkPolicy.enabled }}
{{- if eq (include "simple-s3-cache.cacheEnabled" .) "true" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "simple-s3-cache.fullname" . }}-cache
  labels:
    {{- include "simple-s3-cache.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
spec:
  podSelector:
    matchLabels:
      {{- include "simple-s3-cache.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if eq (include "simple-s3-cache.topology" .) "gateway" }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "simple-s3-cache.gatewaySelectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "simple-s3-cache.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    {{- else }}
    - from:
        {{- if .Values.networkPolicy.ingressFrom }}
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
        {{- else }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.egress.allowAll }}
    - {}
    {{- else }}
    {{- if .Values.networkPolicy.egress.allowDNS }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- end }}
{{- end }}
{{- if and (eq (include "simple-s3-cache.cacheEnabled" .) "true") (eq (include "simple-s3-cache.gatewayEnabled" .) "true") }}
---
{{- end }}
{{- if eq (include "simple-s3-cache.gatewayEnabled" .) "true" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "simple-s3-cache.fullname" . }}-gateway
  labels:
    {{- include "simple-s3-cache.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  podSelector:
    matchLabels:
      {{- include "simple-s3-cache.gatewaySelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingressFrom }}
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
        {{- else }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    {{- if .Values.networkPolicy.egress.allowAll }}
    - {}
    {{- else }}
    {{- if .Values.networkPolicy.egress.allowDNS }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- end }}
{{- end }}
{{- end }}
