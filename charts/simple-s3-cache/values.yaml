# Supported topologies:
# - single: one cache pod, no peer routing.
# - peer: multiple cache peers behind the cache Service.
topology: single

replicaCount: 1

image:
  repository: ghcr.io/ekkuleivonen/simple-s3-cache
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

upstream:
  endpoint: http://rustfs:9000
  host: ""
  region: us-east-1
  responseHeaderTimeout: 30s
  credentials:
    existingSecret: ""
    accessKeyKey: access_key
    secretKeyKey: secret_key
    sessionTokenKey: session_token
    sessionTokenEnabled: false
    accessKey: simple-s3-cache
    secretKey: change-me
    sessionToken: ""

cache:
  cachePath: /cache/objects
  metaPath: /meta
  maxSize: 1TiB
  pageSize: 4MiB
  metadataGCInterval: 1h
  metadataMaxAge: 24h
  metadataGCBatchSize: 512
  sqliteCheckpointInterval: 6h

http:
  readHeaderTimeout: 5s
  readTimeout: 10m
  writeTimeout: 10m
  idleTimeout: 2m

upload:
  spoolPath: /cache/spool
  maxSpoolSize: 10GiB

peer:
  authSecret: ""
  auth:
    existingSecret: ""
    key: auth_secret
  readSharding: auto
  pageShardingMinPages: 2
  maxPeerFillConcurrency: 32
  maxPeerObjectFillConcurrency: 4
  forwardTimeout: 10m

logging:
  accessLog: true
  internalPeerAccessLog: false
  internalPeerSuccessLog: false

operator:
  enabled: false
  path: /debug/peer
  bearerToken: ""

initConfig:
  image:
    repository: busybox
    tag: stable
    pullPolicy: IfNotPresent
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsGroup: 65532
    runAsNonRoot: true
    runAsUser: 65532

cacheService:
  enabled: null
  type: ClusterIP
  port: 8080
  annotations: {}
  externalTrafficPolicy: ""
  loadBalancerIP: ""

peerService:
  publishNotReadyAddresses: true
  annotations: {}

peerLoadBalancerServices:
  enabled: false
  type: LoadBalancer
  port: 8080
  annotations: {}
  externalTrafficPolicy: Local
  loadBalancerIPs: []
  loadBalancerSourceRanges: []

persistence:
  enabled: true
  data:
    size: 100Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    selector: {}
  meta:
    size: 20Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    selector: {}

resources: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65532
  runAsGroup: 65532
  runAsUser: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
updateStrategy:
  type: RollingUpdate

podAntiAffinity:
  enabled: false
  required: true
  topologyKey: kubernetes.io/hostname

pdb:
  enabled: false
  minAvailable: ""
  maxUnavailable: 1

serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}

prometheusRule:
  enabled: false
  labels: {}
  rules:
    - alert: SimpleS3CachePeerDegraded
      expr: simple_s3_cache_degraded > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: simple-s3-cache peer is degraded
        description: 'Peer {{ $labels.local_id }} is degraded with reason {{ $labels.reason_code }}.'
    - alert: SimpleS3CacheInvalidationFailures
      expr: increase(simple_s3_cache_invalidation_broadcasts_total{status="failure"}[5m]) > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: simple-s3-cache invalidation broadcast failed
        description: A cache peer failed to apply an invalidation broadcast.
    - alert: SimpleS3CachePeerReadFallbacks
      expr: increase(simple_s3_cache_peer_read_fallbacks_total[10m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: simple-s3-cache peer reads are falling back to upstream
        description: Peer read fallback traffic is present; check peer connectivity and readiness.

networkPolicy:
  enabled: false
  # Restricts client ingress. Empty means namespace-local ingress for single,
  # peer pods.
  ingressFrom: []
  egress:
    allowDNS: true
    allowAll: true
