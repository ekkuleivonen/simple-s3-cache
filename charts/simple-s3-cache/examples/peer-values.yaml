topology: peer
replicaCount: 4

image:
  repository: ghcr.io/ekkuleivonen/simple-s3-cache
  tag: "0.0.7"

upstream:
  endpoint: http://rustfs-api.rustfs.svc.cluster.local:9000
  region: us-east-1
  credentials:
    existingSecret: rustfs-credentials
    accessKeyKey: RUSTFS_ACCESS_KEY
    secretKeyKey: RUSTFS_SECRET_KEY

cache:
  maxSize: 90GiB
  pageSize: 4MiB

peer:
  auth:
    existingSecret: simple-s3-cache-peer-auth
    key: auth_secret
  readSharding: auto
  pageShardingMinPages: 2
  maxPeerFillConcurrency: 32
  maxPeerObjectFillConcurrency: 4
  forwardTimeout: 10m

logging:
  accessLog: true
  internalPeerAccessLog: false
  internalPeerSuccessLog: false

operator:
  enabled: true
  path: /debug/peer
  bearerToken: replace-with-operator-token

persistence:
  data:
    size: 100Gi
    storageClass: local-storage-nvme
  meta:
    size: 20Gi
    storageClass: local-storage-nvme

cacheService:
  type: LoadBalancer
  port: 9000

peerLoadBalancerServices:
  enabled: true
  port: 9000
  loadBalancerIPs:
    - 192.168.30.217
    - 192.168.30.218
    - 192.168.30.219
    - 192.168.30.220

podAntiAffinity:
  enabled: true
  required: true

pdb:
  enabled: true
  maxUnavailable: 1

serviceMonitor:
  enabled: true

prometheusRule:
  enabled: true
