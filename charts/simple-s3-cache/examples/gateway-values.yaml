topology: gateway
replicaCount: 4

image:
  repository: ghcr.io/ekkuleivonen/simple-s3-cache
  tag: latest

upstream:
  endpoint: http://rustfs-api.rustfs.svc.cluster.local:9000
  # Optional when the upstream validates requests against an external authority.
  # host: 192.168.30.216:9000
  region: us-east-1
  credentials:
    existingSecret: rustfs-credentials
    accessKeyKey: RUSTFS_ACCESS_KEY
    secretKeyKey: RUSTFS_SECRET_KEY

cache:
  maxSize: 90GiB
  pageSize: 4MiB

persistence:
  data:
    size: 100Gi
    storageClass: local-storage-nvme
  meta:
    size: 20Gi
    storageClass: local-storage-nvme

gateway:
  replicaCount: 2
  service:
    type: LoadBalancer
    port: 9000

podAntiAffinity:
  enabled: true
  required: true

serviceMonitor:
  enabled: true

networkPolicy:
  enabled: true
  egress:
    allowDNS: true
    allowAll: true
